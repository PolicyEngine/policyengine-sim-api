name: Publish API clients

on:
  workflow_run:
    workflows: ["Deploy Simulation API to Modal"]
    types:
      - completed
    branches:
      - main


jobs:
  publish:
    name: Publish API clients
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Generate API clients
      run: |
        ./scripts/generate-clients.sh

    - name: Build simulation API client
      run: |
        cd projects/policyengine-simulation-executor/artifacts/clients/python
        # Update version
        DATE=$(date +%Y%m%d)
        RUN_NUMBER="${{ github.run_number }}"
        NEW_VERSION="0.${DATE}.${RUN_NUMBER}"
        sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" pyproject.toml
        uv build

    - name: Publish simulation API client to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI }}
        packages-dir: projects/policyengine-simulation-executor/artifacts/clients/python/dist/
