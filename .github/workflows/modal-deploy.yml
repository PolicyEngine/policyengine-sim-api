name: Deploy Simulation API to Modal

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_beta:
        description: 'Skip beta deployment and deploy directly to prod'
        required: false
        default: false
        type: boolean
      force_latest:
        description: 'Force latest pointers to this deployment, for intentional rollbacks'
        required: false
        default: false
        type: boolean
      force_recompute:
        description: 'Recompute artifacts even when the store already has them (write-once: existing objects are never replaced)'
        required: false
        default: false
        type: boolean

concurrency:
  group: modal-deploy-main

jobs:
  setup_environments:
    name: Setup Modal environments
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Make scripts executable
      run: chmod +x .github/scripts/*.sh

    - name: Install dependencies
      working-directory: projects/policyengine-simulation-executor
      run: uv sync

    - name: Ensure Modal environments exist
      working-directory: projects/policyengine-simulation-executor
      env:
        MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      run: ../../.github/scripts/modal-setup-environments.sh

  deploy_beta:
    name: Deploy to beta
    needs: [setup_environments]
    if: ${{ !inputs.skip_beta }}
    uses: ./.github/workflows/modal-deploy.reusable.yml
    with:
      environment: beta
      modal_environment: staging
      force_latest: ${{ inputs.force_latest || false }}
      force_recompute: ${{ inputs.force_recompute || false }}
    secrets: inherit

  deploy_prod:
    name: Deploy to production
    needs: [deploy_beta]
    if: ${{ always() && (needs.deploy_beta.result == 'success' || inputs.skip_beta) }}
    uses: ./.github/workflows/modal-deploy.reusable.yml
    with:
      environment: prod
      modal_environment: main
      force_latest: ${{ inputs.force_latest || false }}
      force_recompute: ${{ inputs.force_recompute || false }}
    secrets: inherit

  summary:
    name: Deployment summary
    needs: [deploy_beta, deploy_prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Make scripts executable
      run: chmod +x .github/scripts/*.sh

    - name: Report status
      run: |
        .github/scripts/modal-deployment-summary.sh \
          "${{ needs.deploy_beta.result }}" \
          "${{ needs.deploy_beta.outputs.simulation_api_url }}" \
          "${{ needs.deploy_prod.result }}" \
          "${{ needs.deploy_prod.outputs.simulation_api_url }}"
